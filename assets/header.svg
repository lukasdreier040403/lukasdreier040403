<svg width="880" height="300" viewBox="0 0 880 300" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, 'DejaVu Sans Mono', monospace">
  <!--
    1r6 terminal header
    palette (swap these to match 1r6.dev exactly):
      window bg   #0a0e14
      border      #1f2630
      accent      #00ff87
      glitch cyan #00e5ff
      glitch mag  #ff2ba6
      text        #e6edf3
      muted       #8b949e
  -->

  <defs>
    <clipPath id="type1">
      <rect x="151" y="54" width="0" height="22">
        <animate attributeName="width" begin="0.4s" dur="0.72s" fill="freeze" calcMode="discrete" values="0;9;18;28;37;46;58"/>
      </rect>
    </clipPath>
    <clipPath id="type2">
      <rect x="151" y="160" width="0" height="22">
        <animate attributeName="width" begin="2.0s" dur="1.1s" fill="freeze" calcMode="discrete" values="0;9;18;27;36;45;54;63;72;81;90;100;109;118;130"/>
      </rect>
    </clipPath>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="3" width="4" height="1" fill="#ffffff" fill-opacity="0.025"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="299" rx="12" fill="#0a0e14" stroke="#1f2630"/>

  <circle cx="24" cy="18" r="5.5" fill="#ff5f57"/>
  <circle cx="44" cy="18" r="5.5" fill="#febc2e"/>
  <circle cx="64" cy="18" r="5.5" fill="#28c840"/>
  <text x="440" y="23" text-anchor="middle" font-size="12" fill="#8b949e">lukas@1r6: ~</text>
  <line x1="0.5" y1="36" x2="879.5" y2="36" stroke="#1f2630"/>

  <text x="24" y="70" font-size="15" fill="#00ff87">lukas@1r6:~ $</text>
  <text x="151" y="70" font-size="15" fill="#e6edf3" clip-path="url(#type1)">whoami</text>

  <g opacity="0">
    <animate attributeName="opacity" begin="1.35s" dur="0.35s" fill="freeze" values="0;1"/>
    <text x="22" y="118" font-size="54" font-weight="bold" fill="#00e5ff" opacity="0">1r6<animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0;0;0.85;0;0.6;0;0" keyTimes="0;0.70;0.72;0.74;0.76;0.78;1"/></text>
    <text x="26" y="119" font-size="54" font-weight="bold" fill="#ff2ba6" opacity="0">1r6<animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0;0;0.7;0;0.8;0;0" keyTimes="0;0.70;0.72;0.74;0.76;0.78;1"/></text>
    <text x="24" y="118" font-size="54" font-weight="bold" fill="#00ff87">1r6<animateTransform attributeName="transform" type="translate" dur="4s" repeatCount="indefinite" values="0 0;0 0;-1.5 0;1.5 0;0 0" keyTimes="0;0.70;0.73;0.76;0.79"/></text>
    <text x="140" y="100" font-size="25" font-weight="600" fill="#e6edf3">Lukas Ryborg Dreier</text>
    <text x="140" y="122" font-size="13" fill="#8b949e">web apps · APIs · developer experience</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" begin="1.9s" dur="0.2s" fill="freeze" values="0;1"/>
    <text x="24" y="176" font-size="15" fill="#00ff87">lukas@1r6:~ $</text>
  </g>
  <text x="151" y="176" font-size="15" fill="#e6edf3" clip-path="url(#type2)">./status --now</text>

  <g opacity="0">
    <animate attributeName="opacity" begin="3.3s" dur="0.3s" fill="freeze" values="0;1"/>
    <text x="24" y="208" font-size="14.5" fill="#c9d1d9"><tspan fill="#00ff87">&#187;</tspan> full-stack developer &#183; copenhagen</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" begin="3.55s" dur="0.3s" fill="freeze" values="0;1"/>
    <text x="24" y="232" font-size="14.5" fill="#c9d1d9"><tspan fill="#00ff87">&#187;</tspan> typescript &#183; react &#183; .net &#183; rust <tspan fill="#8b949e">&#8594;</tspan> machine learning (2026)</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" begin="3.9s" dur="0.2s" fill="freeze" values="0;1"/>
    <text x="24" y="270" font-size="15" fill="#00ff87">lukas@1r6:~ $</text>
    <rect x="151" y="257" width="9.5" height="17" fill="#00ff87">
      <animate attributeName="opacity" dur="1.06s" repeatCount="indefinite" values="1;1;0;0"/>
    </rect>
  </g>

  <rect x="0.5" y="0.5" width="879" height="299" rx="12" fill="url(#scanlines)"/>
</svg>
